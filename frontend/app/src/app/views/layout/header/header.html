<mat-toolbar class="sticky !bg-blue-400 header-toolbar">

  <button mat-icon-button (click)="layoutService.toggleMenu()">
    <mat-icon>menu</mat-icon>
  </button>

  <span class="header-title">{{ title() }}</span>

  <span class="header-spacer"></span>

  @if (isLoggedIn()) {
    <span class="connected-label">
      {{ getConnectedLabel() }}
    </span>
  }

  @if (isAdminLoggedIn()) {
    <button mat-button routerLink="/admin">
      Admin
    </button>
  }

  @if (canShowLoginButton()) {
    <button mat-button routerLink="/login">
      Login
    </button>
  }

  @if (isLoggedIn()) {
    <button mat-button (click)="logout()">
      Logout
    </button>
  }

</mat-toolbar>
