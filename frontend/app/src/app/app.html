<mat-sidenav-container class="app-container">

  <mat-sidenav
    class="app-sidenav"
    mode="over"
    [opened]="layoutService.sideNavOpened()"
    (openedChange)="layoutService.sideNavOpened.set($event)"
  >
    <mat-toolbar color="primary">Menu</mat-toolbar>

    <mat-nav-list>
      <app-menu></app-menu>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <app-header></app-header>
    <app-content></app-content>
    <app-footer></app-footer>
  </mat-sidenav-content>

</mat-sidenav-container>
